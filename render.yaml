databases:
  - name: midnight-detailing-db
    plan: free
    databaseName: midnight_detailing
    user: midnight

services:
  - type: web
    name: midnight-detailing
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: "bash build.sh"
    startCommand: "python manage.py migrate --no-input && python manage.py seed_data && gunicorn midnight.wsgi:application"
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: midnight-detailing-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: WHATSAPP_NUMBER
        sync: false
      - key: BUSINESS_PHONE
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: DJANGO_EMAIL_BACKEND
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
