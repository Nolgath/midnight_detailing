databases:
  - name: midnight-detailing-db
    plan: free
    region: frankfurt
    databaseName: midnight_detailing
    user: midnight

services:
  - type: web
    name: midnight-detailing
    runtime: python
    plan: standard
    region: frankfurt
    buildCommand: "bash build.sh"
    startCommand: "python manage.py migrate --no-input && python manage.py seed_data && gunicorn midnight.wsgi:application"
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: midnight-detailing-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: WEB_CONCURRENCY
        value: "2"

      # --- Email (Gmail SMTP) ---
      # Único valor manual: EMAIL_HOST_PASSWORD (App Password do Gmail).
      # O Render pede-o no formulário ao criar o Blueprint.
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DJANGO_EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_HOST_USER
        value: "mddetailing2026@gmail.com"
      - key: DEFAULT_FROM_EMAIL
        value: "Midnight Detailing <mddetailing2026@gmail.com>"
      - key: BOOKING_EMAIL
        value: "mddetailing2026@gmail.com"
      - key: CONTACT_EMAIL
        value: "mddetailing2026@gmail.com"

      # --- Negócio / SEO local ---
      # WHATSAPP_NUMBER e BUSINESS_PHONE: atualizar quando houver número real.
      - key: WHATSAPP_NUMBER
        value: "+351900000000"
      - key: BUSINESS_PHONE
        value: "+351900000000"
      - key: GOOGLE_BUSINESS_URL
        value: "https://share.google/WTt0SSLsVUKHG4ySR"
      - key: INSTAGRAM_URL
        value: "https://www.instagram.com/midnight.detailing.oficial/"
      - key: TIKTOK_URL
        value: "https://www.tiktok.com/@midnight.detailin8"
