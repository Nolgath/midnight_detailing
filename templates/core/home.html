<!doctype html>
<html lang="pt-PT">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Midnight Detailing · Lavagem de Carros e Detalhe Automóvel em Alverca do Ribatejo</title>

    <meta name="keywords" content="lavagem de carros alverca, lavar carro alverca, detalhe automóvel alverca, alverca detalhe de carros, car detailing alverca, lavagem automóvel alverca do ribatejo, limpeza interior carro alverca">
    <link rel="canonical" href="{{ SITE_URL }}/">
    <meta name="robots" content="index, follow">

    <meta name="geo.region" content="PT-11">
    <meta name="geo.placename" content="Alverca do Ribatejo">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ SITE_NAME }}">
    <meta property="og:title" content="Midnight Detailing · Lavagem de Carros e Detalhe Automóvel em Alverca do Ribatejo">
    <meta property="og:description" content="Lavagem e detalhe automóvel premium em Alverca. Recolha e entrega ao domicílio. Marca online em 2 minutos.">
    <meta property="og:url" content="{{ SITE_URL }}/">
    <meta property="og:image" content="{{ SITE_URL }}{% load static %}{% static 'img/logo.jpeg' %}">
    <meta property="og:locale" content="pt_PT">
    <meta name="twitter:card" content="summary">

    <link rel="icon" type="image/jpeg" href="{% static 'img/logo.jpeg' %}">

    {% include 'core/partials/seo_jsonld.html' %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0A0A0A;
            --fg: #FFFFFF;
            --fg-dim: #9A9A9A;
            --fg-faint: #6A6A6A;
            --line: rgba(255, 255, 255, 0.10);
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }

        a { color: inherit; text-decoration: none; }

        /* Toque: sem atraso de 300ms, sem realce azul, área toda ativa. */
        a, button, .nav-toggle, .hero__cta, .nav__link {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .hero__cta > *, .nav-toggle > * { pointer-events: none; }

        /* ---------- Liquid background ---------- */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            will-change: transform;
        }
        .blob--1 {
            width: 48vw; height: 48vw;
            left: -10vw; top: -12vh;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.27), rgba(255, 255, 255, 0) 70%);
            animation: drift1 16s ease-in-out infinite alternate;
        }
        .blob--2 {
            width: 54vw; height: 54vw;
            right: -14vw; top: 14vh;
            background: radial-gradient(circle at 60% 40%, rgba(215, 215, 215, 0.22), rgba(255, 255, 255, 0) 70%);
            animation: drift2 20s ease-in-out infinite alternate;
        }
        .blob--3 {
            width: 40vw; height: 40vw;
            left: 28vw; bottom: -20vh;
            background: radial-gradient(circle at 50% 50%, rgba(235, 235, 235, 0.20), rgba(255, 255, 255, 0) 70%);
            animation: drift3 23s ease-in-out infinite alternate;
        }
        @keyframes drift1 {
            from { transform: translate(-5vw, -4vh) scale(1); }
            to   { transform: translate(17vw, 13vh) scale(1.3); }
        }
        @keyframes drift2 {
            from { transform: translate(5vw, -3vh) scale(1.12); }
            to   { transform: translate(-16vw, 12vh) scale(0.85); }
        }
        @keyframes drift3 {
            from { transform: translate(0, 5vh) scale(1); }
            to   { transform: translate(13vw, -15vh) scale(1.32); }
        }
        @media (prefers-reduced-motion: reduce) {
            .blob { animation: none; }
        }
        /* No telemóvel, três blobs com blur(90px) a animar escala pesam
           imenso no GPU (jank, bateria, sensação de lentidão). Reduzimos o
           blur, tiramos a escala da animação e dispensamos um dos blobs. */
        @media (max-width: 760px) {
            .blob { filter: blur(45px); }
            .blob--3 { display: none; }
            @keyframes drift1 {
                from { transform: translate(-5vw, -4vh); }
                to   { transform: translate(12vw, 10vh); }
            }
            @keyframes drift2 {
                from { transform: translate(5vw, -3vh); }
                to   { transform: translate(-12vw, 9vh); }
            }
        }

        /* ---------- Navbar ---------- */
        .navbar {
            position: relative;
            z-index: 50;
            flex: none;
            border-bottom: 1px solid var(--line);
        }
        .navbar__inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 22px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar__brand { display: inline-flex; align-items: baseline; gap: 8px; font-family: var(--font-display); font-weight: 700; letter-spacing: 0.02em; }
        .navbar__brand-main { font-size: 18px; text-transform: uppercase; }
        .navbar__brand-sub { font-size: 18px; font-weight: 500; text-transform: uppercase; color: var(--fg-dim); }
        .nav { display: flex; align-items: center; gap: 40px; }
        .nav__link { position: relative; color: var(--fg-dim); font-size: 15px; transition: color 0.25s ease; }
        .nav__link::after { content: ""; position: absolute; left: 0; bottom: -6px; width: 0; height: 1px; background: var(--fg); transition: width 0.28s ease; }
        .nav__link:hover { color: var(--fg); }
        .nav__link:hover::after { width: 100%; }

        /* ---------- Hero ---------- */
        .hero {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px 24px;
        }
        .hero__eyebrow {
            font-size: 12px;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--fg-faint);
            margin-bottom: 28px;
        }
        .hero__title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(30px, 5.4vw, 60px);
            line-height: 1.08;
            letter-spacing: -0.02em;
            max-width: 18ch;
            margin: 0 0 40px;
        }
        .hero__cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--fg);
            color: var(--bg);
            font-weight: 500;
            font-size: 16px;
            padding: 17px 30px;
            border-radius: 999px;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .hero__cta .arrow { transition: transform 0.22s ease; }
        .hero__cta:hover { opacity: 0.9; }
        .hero__cta:hover .arrow { transform: translate(3px, -3px); }

        @media (max-width: 640px) {
            .navbar__inner { padding: 18px 22px; }
        }

        /* ---------- Mobile nav ---------- */
        .nav-toggle { display: none; }
        @media (max-width: 760px) {
            .nav-toggle {
                display: inline-flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 5px;
                width: 44px; height: 44px;
                margin: -8px -8px -8px 0;
                background: transparent; border: none; cursor: pointer;
            }
            .nav-toggle__bar { display: block; width: 22px; height: 2px; background: var(--fg); transition: transform .25s ease, opacity .25s ease; }
            .navbar.is-open .nav-toggle__bar:nth-child(1) { transform: translateY(3.5px) rotate(45deg); }
            .navbar.is-open .nav-toggle__bar:nth-child(2) { transform: translateY(-3.5px) rotate(-45deg); }

            .nav {
                position: absolute;
                top: 100%; left: 0; right: 0;
                flex-direction: column;
                align-items: stretch;
                gap: 0;
                background: rgba(10, 10, 10, 0.97);
                backdrop-filter: saturate(140%) blur(14px);
                -webkit-backdrop-filter: saturate(140%) blur(14px);
                border-bottom: 1px solid var(--line);
                padding: 4px 22px 14px;
                transform: translateY(-10px);
                opacity: 0;
                pointer-events: none;
                transition: opacity .22s ease, transform .22s ease;
            }
            .navbar.is-open .nav { opacity: 1; transform: translateY(0); pointer-events: auto; }
            .nav__link { padding: 15px 2px; font-size: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
            .nav__link:last-child { border-bottom: none; }
            .nav__link::after { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg" aria-hidden="true">
        <span class="blob blob--1"></span>
        <span class="blob blob--2"></span>
        <span class="blob blob--3"></span>
    </div>
    <script>
    /* Mantém o fundo num fluxo contínuo durante toda a sessão do site:
       em cada página retoma a animação na fase em que ia (animation-delay negativo). */
    (function () {
        var KEY = 'mdBgEpoch';
        var now = Date.now();
        var start = parseInt(sessionStorage.getItem(KEY) || '', 10);
        if (!start) { start = now; sessionStorage.setItem(KEY, String(start)); }
        var delay = '-' + ((now - start) / 1000).toFixed(3) + 's';
        var blobs = document.querySelectorAll('.blob');
        for (var i = 0; i < blobs.length; i++) { blobs[i].style.animationDelay = delay; }
    })();
    </script>

    <header class="navbar">
        <div class="navbar__inner">
            <a class="navbar__brand" href="/" aria-label="Midnight Detailing — Início">
                <span class="navbar__brand-main">Midnight</span>
                <span class="navbar__brand-sub">Detailing</span>
            </a>
            <button class="nav-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="primary-nav">
                <span class="nav-toggle__bar" aria-hidden="true"></span>
                <span class="nav-toggle__bar" aria-hidden="true"></span>
            </button>
            <nav class="nav" id="primary-nav" aria-label="Navegação principal">
                <a class="nav__link" href="/servicos/">Serviços</a>
                <a class="nav__link" href="/sobre/">Sobre</a>
            </nav>
        </div>
    </header>

    <main class="hero">
        <span class="hero__eyebrow">Detalhe Automóvel · Alverca do Ribatejo</span>
        <h1 class="hero__title">
            Transformamos o look do teu carro em Alverca. Lavagem e detalhe completos, sem preocupações.
        </h1>
        <a class="hero__cta" href="/servicos/">
            Personaliza o teu serviço e marca
            <span class="arrow" aria-hidden="true">↗</span>
        </a>
    </main>

    <script>
    (function () {
        var navbar = document.querySelector('.navbar');
        var toggle = navbar && navbar.querySelector('.nav-toggle');
        if (!toggle) return;
        var setOpen = function (open) {
            navbar.classList.toggle('is-open', open);
            toggle.setAttribute('aria-expanded', String(open));
            toggle.setAttribute('aria-label', open ? 'Fechar menu' : 'Abrir menu');
        };
        toggle.addEventListener('click', function () { setOpen(!navbar.classList.contains('is-open')); });
        navbar.querySelectorAll('.nav__link').forEach(function (link) {
            link.addEventListener('click', function () { setOpen(false); });
        });
    })();
    </script>
</body>
</html>
